services:
  - type: web
    name: kalinabis
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn servidor:app
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: DATABASE_URL
        fromDatabase:
          name: kalinabis-db
          property: connectionString

databases:
  - name: kalinabis-db
    databaseName: kalinabis
    plan: free
