<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalinabis</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0908; --bg2:#110f0d; --bg3:#1a1714; --surface:#221f1b;
  --border:#2e2a25; --border2:#3d382f; --text:#e8e0d4; --muted:#7a7060; --dim:#3d3830;
  --isis:#c4824a; --afrodita:#b8a0cc; --lilith:#5a9bc4; --artemisa:#7aad6a;
  --tutu:#c4a96a; --kali:#8a7a8a;
  --smoke-r:90; --smoke-g:85; --smoke-b:78;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:19px; line-height:1.8; min-height:100vh; overflow:hidden;
}
@media (hover: hover) and (pointer: fine) {
  body { cursor:none; }
}
/* ── CURSOR PERSONALIZADO ── */
#cursor {
  position:fixed; pointer-events:none; z-index:9999;
  width:28px; height:28px; margin-left:-14px; margin-top:-14px;
  transition:transform 0.15s ease;
  font-size:20px; text-align:center; line-height:28px;
  filter:drop-shadow(0 0 6px currentColor);
  color:var(--tutu);
}
#cursor.clicking { transform:scale(0.7); }

/* ── CANVAS HUMO Y CHISPAS ── */
#smoke-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%, #c4824a09 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 80%, #5a9bc40c 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%, #b8a0cc06 0%, transparent 70%);
}

/* ── VELO DE TRANSICIÓN ── */
#velo {
  position:fixed; inset:0; z-index:50; pointer-events:none;
  background:rgba(10,9,8,0); transition:background 0.6s ease;
}
#velo.oscuro { background:rgba(10,9,8,0.85); }

/* ── LAYOUT ── */
.app {
  position:relative; z-index:1;
  display:grid; grid-template-columns:240px 1fr; grid-template-rows:60px 1fr;
  height:100vh;
}

/* ── MODO RITUAL ── */
body.ritual .panel-deidades,
body.ritual header { opacity:0; pointer-events:none; transition:opacity 0.8s; }
body.ritual .app { grid-template-columns:0 1fr; }
body.ritual .panel-chat { grid-column:1/-1; }
.ritual-exit {
  display:none; position:fixed; top:20px; right:20px; z-index:200;
  background:transparent; border:1px solid var(--border2); border-radius:4px;
  color:var(--muted); font-family:'Cinzel',serif; font-size:10px;
  letter-spacing:0.15em; padding:8px 16px; cursor:none;
}
body.ritual .ritual-exit { display:block; }

/* ── HEADER ── */
header {
  grid-column:1/-1; display:flex; align-items:center; justify-content:space-between;
  padding:0 28px; border-bottom:1px solid var(--border);
  background:rgba(10,9,8,0.88); backdrop-filter:blur(8px);
  transition:opacity 0.8s;
}
.logo { font-family:'Cinzel',serif; font-size:14px; letter-spacing:0.3em; color:var(--muted); }
.logo span { color:var(--text); }
.header-right { display:flex; align-items:center; gap:20px; }
.project-code-wrap { display:flex; align-items:center; gap:6px; font-family:'Inter',sans-serif; font-size:11px; color:var(--muted); }
.project-code-label { opacity:0.6; }
.project-code { font-family:'Cinzel',serif; font-size:12px; color:var(--tutu); cursor:pointer; padding:2px 8px; border:1px solid var(--border); border-radius:4px; transition:all 0.3s; letter-spacing:0.5px; }
.project-code:hover { border-color:var(--tutu); background:rgba(196,169,106,0.1); }
.header-status { font-size:12px; color:var(--muted); letter-spacing:0.05em; font-family:'Inter',sans-serif; font-weight:300; }
.status-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--artemisa); margin-right:8px; animation:pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Botones header */
.hdr-btn {
  background:transparent; border:1px solid var(--border); border-radius:3px;
  padding:6px 12px; color:var(--muted); font-family:'Cinzel',serif;
  font-size:9px; letter-spacing:0.15em; cursor:none; transition:all 0.2s;
}
.hdr-btn:hover { color:var(--text); border-color:var(--border2); }
.hdr-btn.on { color:var(--tutu); border-color:var(--tutu); }

/* ── PANEL IZQUIERDO ── */
.panel-deidades {
  border-right:1px solid var(--border); padding:20px 0; overflow-y:auto;
  background:rgba(10,9,8,0.72); backdrop-filter:blur(6px);
  transition:opacity 0.8s;
}
.panel-title { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.3em; color:var(--dim); text-transform:uppercase; padding:0 18px 16px; }
.kali-node { padding:10px 16px; margin:0 10px 6px; border-radius:6px; border:1px solid #2a2520; transition:all 0.3s; }
.kali-node:hover { border-color:var(--kali); }
.kali-name { font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.22em; color:var(--kali); }
.kali-desc { font-size:13px; color:var(--muted); font-style:italic; margin-top:3px; }
.deity-divider { height:1px; background:var(--border); margin:10px 18px; }

.deity-btn {
  display:block; width:calc(100% - 20px); margin:0 10px 3px;
  padding:10px 14px; background:transparent; border:1px solid transparent;
  border-radius:6px; cursor:none; text-align:left; transition:all 0.2s;
  font-family:'Cormorant Garamond',serif; color:var(--text);
  position:relative; overflow:hidden;
}
.deity-btn::after {
  content:''; position:absolute; inset:0; background:radial-gradient(circle at 50% 50%, var(--d-color) 0%, transparent 70%);
  opacity:0; transition:opacity 0.4s; border-radius:6px;
}
.deity-btn:hover::after { opacity:0.08; }
.deity-btn.invocando::after { opacity:0.25; animation:invoca 0.6s ease; }
@keyframes invoca { 0%{opacity:0;transform:scale(0.5)} 50%{opacity:0.3} 100%{opacity:0.1;transform:scale(1)} }
.deity-btn[data-deity="isis"]     { --d-color:var(--isis); }
.deity-btn[data-deity="afrodita"] { --d-color:var(--afrodita); }
.deity-btn[data-deity="lilith"]   { --d-color:var(--lilith); }
.deity-btn[data-deity="artemisa"] { --d-color:var(--artemisa); }
.deity-btn[data-deity="tutu"]     { --d-color:var(--tutu); }
.deity-btn.active { border-color:var(--d-color); background:var(--bg2); }
.deity-header { display:flex; align-items:center; gap:10px; }
.deity-dot { width:6px; height:6px; border-radius:50%; background:var(--d-color); flex-shrink:0; }
.deity-name { font-family:'Cinzel',serif; font-size:14px; letter-spacing:0.15em; color:var(--d-color); }
.deity-symbols { display:flex; align-items:center; gap:8px; margin-top:5px; padding-left:16px; }
.alch-symbol { font-size:22px; line-height:1; opacity:0.75; }
.compass-mini { width:28px; height:28px; flex-shrink:0; }
.deity-memory {
  display:none; margin:0 10px 6px; padding:8px 12px;
  background:var(--bg2); border-radius:0 0 6px 6px;
  border:1px solid var(--border); border-top:none;
  font-size:13px; color:var(--muted); font-style:italic;
  max-height:100px; overflow-y:auto; line-height:1.6;
}
.deity-memory.visible { display:block; }
.memory-msg { margin-bottom:3px; }
.memory-msg.user { color:var(--dim); }
.tutu-section { margin-top:6px; }

/* ── CHAT ── */
.panel-chat { display:flex; flex-direction:column; background:transparent; overflow:hidden; }
.chat-header {
  padding:16px 28px 14px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  background:rgba(10,9,8,0.62); backdrop-filter:blur(4px);
}
.active-deity-name { font-family:'Cinzel',serif; font-size:22px; letter-spacing:0.1em; transition:color 0.5s; }
.active-deity-symbol { font-size:22px; opacity:0.85; transition:all 0.5s; }
.active-deity-compass { width:36px; height:36px; }
.active-deity-attrs { font-size:14px; color:var(--muted); font-style:italic; margin-left:auto; }
.cerrar-ritual-btn {
  background:transparent; border:1px solid var(--border); border-radius:3px;
  padding:5px 10px; color:var(--dim); font-family:'Cinzel',serif;
  font-size:9px; letter-spacing:0.12em; cursor:none; transition:all 0.2s;
  margin-left:12px;
}
.cerrar-ritual-btn:hover { color:var(--isis); border-color:var(--isis); }

.chat-messages {
  flex:1; overflow-y:auto; padding:28px;
  display:flex; flex-direction:column; gap:22px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.msg { max-width:80%; animation:fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg-user  { align-self:flex-end; }
.msg-deity { align-self:flex-start; }
.msg-bubble { padding:13px 17px; font-size:18px; line-height:1.85; }
.msg-user .msg-bubble { background:var(--surface); border:1px solid var(--border2); border-radius:4px 4px 0 4px; }
.msg-deity .msg-bubble { background:rgba(17,15,13,0.88); border-left:2px solid var(--d-color,var(--tutu)); border-radius:0 4px 4px 4px; font-style:italic; }
.msg-label { font-family:'Cinzel',serif; font-size:12px; letter-spacing:0.2em; color:var(--muted); margin-bottom:6px; display:flex; align-items:center; gap:8px; }
.msg-deity .msg-label { color:var(--d-color,var(--tutu)); }
.msg-meta { font-size:13px; color:var(--dim); margin-top:6px; font-family:'Inter',sans-serif; font-weight:300; display:flex; align-items:center; gap:10px; }
.msg-user .msg-meta { justify-content:flex-end; }

/* Botón quemar */
.burn-btn {
  background:transparent; border:none; color:var(--dim); font-size:12px;
  cursor:none; padding:0; transition:color 0.2s; opacity:0;
}
.msg:hover .burn-btn { opacity:1; }
.burn-btn:hover { color:#c4824a; }

/* Efecto quemar */
.msg.burning { animation:burn 0.8s ease forwards; }
@keyframes burn { 0%{opacity:1;transform:scaleY(1)} 40%{opacity:0.6;transform:scaleY(0.3) translateY(10px);filter:blur(2px)} 100%{opacity:0;transform:scaleY(0) translateY(20px);filter:blur(8px)} }

/* Typewriter */
.typewriter-cursor::after { content:'|'; animation:blink 0.8s infinite; color:var(--d-color,var(--tutu)); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Carga */
.msg-loading .msg-bubble { display:flex; gap:6px; align-items:center; padding:18px; }
.dot-wave span { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--muted); animation:wave 1.4s ease-in-out infinite; }
.dot-wave span:nth-child(2){animation-delay:.2s} .dot-wave span:nth-child(3){animation-delay:.4s}
@keyframes wave { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

/* ── INPUT ── */
.chat-input-area { padding:18px 28px; border-top:1px solid var(--border); flex-shrink:0; background:rgba(10,9,8,0.78); backdrop-filter:blur(6px); }
.input-row { display:flex; gap:12px; align-items:flex-end; }
#msg-input {
  flex:1; background:var(--bg2); border:1px solid var(--border2); border-radius:4px;
  padding:12px 16px; color:var(--text); font-family:'Cormorant Garamond',serif;
  font-size:18px; resize:none; min-height:48px; max-height:120px; outline:none;
  transition:border-color 0.3s; line-height:1.5; cursor:none;
}
#msg-input::placeholder { color:var(--dim); font-style:italic; }
.send-btn {
  background:var(--surface); border:1px solid var(--border2); border-radius:4px;
  padding:12px 20px; color:var(--text); cursor:none;
  font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.15em; transition:all 0.2s; white-space:nowrap;
}
.send-btn:hover { border-color:var(--tutu); color:var(--tutu); }
.send-btn:disabled { opacity:0.4; cursor:none; }
.input-hint { font-size:13px; color:var(--dim); font-style:italic; margin-top:7px; font-family:'Inter',sans-serif; font-weight:300; }

/* ── MODAL ── */
.modal-overlay { display:none; position:fixed; inset:0; background:#0a090888; z-index:100; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border2); border-radius:6px; padding:28px; width:500px; max-width:90vw; }
.modal-title { font-family:'Cinzel',serif; font-size:14px; letter-spacing:0.15em; margin-bottom:20px; color:var(--tutu); }
.modal input,.modal textarea,.modal select { width:100%; background:var(--bg); border:1px solid var(--border2); border-radius:3px; padding:10px 14px; color:var(--text); font-family:'Cormorant Garamond',serif; font-size:15px; margin-bottom:12px; outline:none; cursor:none; }
.modal textarea { min-height:100px; resize:vertical; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:8px; }
.btn-cancel,.btn-save { padding:9px 20px; border-radius:3px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.15em; cursor:none; transition:all 0.2s; }
.btn-cancel { background:transparent; border:1px solid var(--border2); color:var(--muted); }
.btn-cancel:hover { color:var(--text); }
.btn-save { background:transparent; border:1px solid var(--tutu); color:var(--tutu); }
.btn-save:hover { background:var(--tutu); color:var(--bg); }

/* Grimorio modal */
.modal-grimorio { width:600px; max-height:80vh; display:flex; flex-direction:column; }
.grimorio-tabs { display:flex; gap:0; margin-bottom:16px; border-bottom:1px solid var(--border); }
.grimorio-tab {
  flex:1; background:transparent; border:none; border-bottom:2px solid transparent;
  padding:10px 0; color:var(--muted); font-family:'Cinzel',serif; font-size:10px;
  letter-spacing:0.12em; cursor:none; transition:all 0.2s;
}
.grimorio-tab:hover { color:var(--text); }
.grimorio-tab.active { color:var(--tutu); border-bottom-color:var(--tutu); }
.grimorio-panel { flex:1; overflow-y:auto; min-height:0; }
.grimorio-lista { display:flex; flex-direction:column; gap:8px; max-height:45vh; overflow-y:auto; }
.grimorio-item {
  padding:12px 14px; background:var(--bg); border:1px solid var(--border);
  border-radius:4px; transition:all 0.2s;
}
.grimorio-item:hover { border-color:var(--border2); }
.grimorio-item-titulo {
  font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.1em;
  color:var(--tutu); margin-bottom:4px;
}
.grimorio-item-meta {
  font-size:11px; color:var(--dim); font-family:'Inter',sans-serif;
  font-weight:300; margin-bottom:6px;
}
.grimorio-item-contenido {
  font-size:14px; color:var(--muted); font-style:italic; line-height:1.6;
}
.grimorio-item-entidad {
  display:inline-block; padding:2px 6px; border-radius:3px;
  font-size:10px; font-family:'Cinzel',serif; letter-spacing:0.1em;
  margin-right:6px;
}
.grimorio-vacio { color:var(--dim); font-style:italic; text-align:center; padding:30px; font-size:14px; }

/* Decisiones */
.decision-item {
  padding:10px 14px; background:var(--bg); border:1px solid var(--border);
  border-radius:4px; border-left:2px solid var(--dim);
}
.decision-item-entidad { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.1em; }
.decision-item-razon { font-size:13px; color:var(--muted); font-style:italic; margin-top:4px; }
.decision-item-meta { font-size:11px; color:var(--dim); margin-top:4px; font-family:'Inter',sans-serif; font-weight:300; }
::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ══ ACCESIBILIDAD ═════════════════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ══ SKIP LINK ═════════════════════════════════════════════════════════ */
.skip-link {
  position:fixed; top:-100px; left:8px; z-index:99999;
  background:var(--tutu); color:var(--bg);
  padding:10px 16px; border-radius:4px;
  font-family:'Cinzel',serif; font-size:12px; letter-spacing:0.1em;
  text-decoration:none; transition:top 0.2s;
}
.skip-link:focus { top:8px; outline:2px solid var(--bg); }

/* ══ FOCUS VISIBLE ════════════════════════════════════════════════════ */
:focus-visible {
  outline:2px solid var(--tutu);
  outline-offset:2px;
}
button:focus-visible, [role="button"]:focus-visible {
  outline:2px solid var(--tutu);
  outline-offset:3px;
}

/* ══ SCREEN READER ONLY ═══════════════════════════════════════════════ */
.sr-only {
  position:absolute; width:1px; height:1px;
  padding:0; margin:-1px; overflow:hidden;
  clip:rect(0,0,0,0); white-space:nowrap; border:0;
}

/* ══ MOBILE RESPONSIVE ═══════════════════════════════════════════════ */
@media (max-width: 768px) {
  body { font-size:16px; overflow-y:auto; }
  .app {
    grid-template-columns:1fr;
    grid-template-rows:auto auto 1fr;
    height:auto;
    min-height:100vh;
  }
  .panel-deidades { border-right:none; border-bottom:1px solid var(--border); max-height:none; padding:12px 0; }
  .panel-title { padding:0 16px 10px; font-size:10px; }
  .deity-btn { padding:8px 14px; margin:0 8px 2px; }
  .deity-name { font-size:12px; }
  .kali-node { padding:8px 14px; margin:0 8px 4px; }
  .deity-memory { max-height:60px; font-size:12px; }
  .chat-header { padding:12px 16px 10px; flex-wrap:wrap; }
  .active-deity-name { font-size:18px; }
  .active-deity-symbol { font-size:18px; }
  .active-deity-compass { width:28px; height:28px; }
  .active-deity-attrs { font-size:12px; }
  .cerrar-ritual-btn { font-size:8px; padding:4px 8px; margin-left:6px; }
  .chat-messages { padding:18px 16px; gap:16px; }
  .msg-bubble { font-size:16px; padding:10px 14px; }
  .chat-input-area { padding:14px 16px; }
  #msg-input { font-size:16px; padding:10px 14px; }
  .send-btn { padding:10px 16px; font-size:12px; }
  .modal { width:95vw; max-width:95vw; padding:20px; }
  .modal-grimorio { max-height:85vh; }
  .luna-widget { width:92vw; max-width:92vw; }
  .luna-modal-overlay { padding:16px; }
  header { padding:0 16px; flex-wrap:wrap; gap:10px; height:auto; min-height:60px; }
  .logo { font-size:11px; }
  .project-code { font-size:10px; padding:2px 6px; }
  .header-status { font-size:10px; }
  .ritual-exit { top:12px; right:12px; padding:6px 12px; font-size:9px; }
  .camara-titulo { font-size:18px !important; }
  .lienzo-marco { width:min(400px, 70vw); }
  .tarot-mazo { width:280px; height:160px; }
  .luna-evento { padding:8px 10px; }
  .luna-evento-nombre { font-size:12px; }
  .luna-fase-nombre { font-size:13px; }
  .natal-modal { width:95vw; max-width:95vw; max-height:90vh; overflow-y:auto; }
  .grimorio-item { padding:10px 12px; }
  .grimorio-item-titulo { font-size:12px; }
  .grimorio-item-contenido { font-size:13px; }
}

@media (max-width: 480px) {
  body { font-size:15px; }
  .header-right { gap:10px; }
  .project-code-label { display:none; }
  .active-deity-attrs { display:none; }
  .cerrar-ritual-btn { font-size:7px; padding:3px 6px; }
  .chat-header { padding:10px 12px 8px; }
  .chat-messages { padding:14px 12px; }
  .msg { max-width:92%; }
  .msg-bubble { font-size:15px; }
  .chat-input-area { padding:12px; }
  .send-btn { font-size:10px; padding:8px 12px; }
}

/* ══ PANEL DEL BOSQUE ═══════════════════════════════════════════════ */
.bosque-overlay {
  display:none; position:fixed; inset:0; z-index:160;
  background:rgba(8,7,6,0.97); backdrop-filter:blur(10px);
  overflow-y:auto;
}
.bosque-overlay.open { display:block; animation:bosqueIn 0.4s ease; }
@keyframes bosqueIn { from{opacity:0} to{opacity:1} }
.bosque-container { max-width:1200px; margin:0 auto; padding:24px 32px; }
.bosque-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
.bosque-titulo { font-family:'Cinzel',serif; font-size:20px; letter-spacing:0.2em; color:var(--tutu); margin:0; }

.bosque-salud-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.bosque-amp { margin-top:18px; }
.bosque-amp-label { font-size:11px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; }
.bosque-amp-bar { height:6px; background:var(--surface); border-radius:3px; overflow:hidden; }

.bosque-distribucion-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:12px; }
.bosque-distribucion-item { display:flex; justify-content:space-between; padding:6px 10px; background:var(--bg2); border-radius:3px; }
.bosque-distribucion-tipo { color:var(--muted); text-transform:lowercase; }
.bosque-distribucion-cant { color:var(--tutu); font-family:'Cinzel',serif; }
.bosque-mapa-wrap { background:var(--bg2); border-radius:6px; padding:12px; display:flex; flex-direction:column; gap:12px; }
#bosque-mapa-svg { width:100%; height:auto; min-height:350px; display:block; background:radial-gradient(ellipse at center, rgba(196,169,106,0.05) 0%, transparent 70%); }
.bosque-leyenda { display:flex; flex-wrap:wrap; gap:10px; font-size:11px; color:var(--muted); padding-top:8px; border-top:1px solid var(--border); }
.bosque-leyenda-item { display:flex; align-items:center; gap:5px; }
.bosque-leyenda-punto { width:10px; height:10px; border-radius:50%; }
.bosque-fuertes { display:flex; flex-direction:column; gap:6px; max-height:300px; overflow-y:auto; }
.bosque-fuerte-item { display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--bg2); border:1px solid var(--border); border-radius:4px; }
.bosque-fuerte-label { flex:1; font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bosque-fuerte-amp { font-family:'Cinzel',serif; font-size:12px; color:var(--tutu); }
.bosque-fuerte-bar { width:80px; height:4px; background:var(--surface); border-radius:2px; overflow:hidden; }
.bosque-fuerte-bar-fill { height:100%; background:var(--artemisa); transition:width 0.6s ease; }
.bosque-vacio { text-align:center; padding:30px; color:var(--dim); font-style:italic; font-size:13px; }

@media (max-width: 768px) {
  .bosque-grid { grid-template-columns:1fr; grid-template-areas:"salud" "mapa" "fuertes"; }
  .bosque-container { padding:16px; }
  .bosque-titulo { font-size:16px; }
  .bosque-salud-grid { grid-template-columns:1fr 1fr; }
  #bosque-mapa-svg { min-height:250px; }
}

/* ══ TOASTS ════════════════════════════════════════════════════════════ */
.toast {
  position:fixed; top:20px; right:20px; z-index:9000;
  padding:12px 20px; border-radius:4px;
  font-family:'Inter',sans-serif; font-size:13px; font-weight:300;
  opacity:0; transform:translateY(-10px);
  transition:all 0.3s ease; pointer-events:none;
  max-width:340px;
}
.toast.visible { opacity:1; transform:translateY(0); }
.toast-error { background:rgba(140,60,60,0.92); border:1px solid #8a4a4a; color:#f0d0c0; }
.toast-success { background:rgba(60,100,60,0.92); border:1px solid #5a8a5a; color:#d0f0d0; }
.toast-info { background:rgba(60,80,120,0.92); border:1px solid #5a7a9a; color:#d0e0f0; }

/* ══ PORTAL ASTRAL ══════════════════════════════════════════════════ */
.luna-modal-overlay { display:none; position:fixed; inset:0; z-index:150; background:rgba(6,5,4,0.82); backdrop-filter:blur(6px); align-items:center; justify-content:center; }

.luna-body { padding:0 16px 16px; }

.luna-fila { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }

.luna-seph-nombre { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.15em; color:var(--tutu); margin-bottom:3px; }

.luna-timeline-title { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.22em; color:var(--dim); text-transform:uppercase; margin-bottom:8px; }

.luna-evento-emoji { font-size:14px; width:20px; text-align:center; }
.luna-evento-info { flex:1; }
.luna-evento-nombre { font-size:12px; color:var(--text); }
.luna-evento-fecha { font-size:11px; color:var(--muted); font-style:italic; }
.luna-evento-dias { font-family:'Cinzel',serif; font-size:10px; color:var(--dim); text-align:right; flex-shrink:0; }
.luna-deidades-mod { margin-top:10px; }

.luna-mod-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; }
.luna-mod-item { padding:5px 6px; border-radius:4px; border:1px solid var(--border); text-align:center; }

.luna-mod-item.reposo { opacity:0.45; }

.luna-voc { margin-top:8px; padding:7px 10px; border-radius:4px; border:1px solid #c4824a55; background:rgba(196,130,74,0.08); font-size:11px; color:var(--isis); font-style:italic; line-height:1.5; display:none; }

.luna-deidad-tag { margin-top:10px; padding:8px 12px; border-radius:4px; border:1px solid var(--border); font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.15em; text-align:center; color:var(--muted); transition:all 0.5s; }

.luna-deidad-tag.artemisa { border-color:var(--artemisa);color:var(--artemisa); }
.luna-deidad-tag.tutu { border-color:var(--tutu);color:var(--tutu); }

.deity-amp-dot { width:6px; height:6px; border-radius:50%; display:inline-block; margin-left:6px; opacity:0; transition:opacity 0.5s; flex-shrink:0; }

/* ══ ESPACIO DE INVOCACIÓN ══════════════════════════════════════════ */
#deity-space { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
#deity-atmosphere { position: absolute; inset: 0; transition: background 2.5s ease, opacity 2s ease; opacity: 0; }
#domain-canvas { position: absolute; inset: 0; pointer-events: none; }
#deity-throne-wrap { position: absolute; left: 240px; right: 0; top: 60px; bottom: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
#deity-throne { width: min(480px, 55vw); height: min(680px, 75vh); opacity: 0; transform: scale(0.85); transition: opacity 2.5s ease, transform 2.5s ease; filter: blur(0.5px); animation: throneBreath 10s ease-in-out infinite; }
#deity-throne.visible { opacity: 1; transform: scale(1); }
@keyframes throneBreath { 0%,100% { transform: scale(1); } 50% { transform: scale(1.018); } }

/* Atmósfera por deidad */
body.space-isis #deity-atmosphere { opacity:1; background: radial-gradient(ellipse 90% 50% at 50% -10%, #c4824a1a 0%, transparent 65%), radial-gradient(ellipse 70% 80% at 50% 110%, #7a3a1055 0%, transparent 60%), radial-gradient(ellipse 40% 30% at 20% 40%, #c4824a0d 0%, transparent 50%); }
body.space-afrodita #deity-atmosphere { opacity:1; background: radial-gradient(ellipse 100% 60% at 50% -20%, #b8a0cc1a 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 30%, #e8d0ff0d 0%, transparent 50%), radial-gradient(ellipse 80% 60% at 50% 110%, #6a508833 0%, transparent 60%); }
body.space-lilith #deity-atmosphere { opacity:1; background: radial-gradient(ellipse 80% 60% at 50% -10%, #1a3a5522 0%, transparent 60%), radial-gradient(ellipse 100% 80% at 50% 120%, #0a1a2a66 0%, transparent 60%), radial-gradient(ellipse 50% 30% at 10% 50%, #5a9bc41a 0%, transparent 40%), radial-gradient(ellipse 50% 30% at 90% 50%, #5a9bc41a 0%, transparent 40%); }

body.space-tutu #deity-atmosphere { opacity:1; background: radial-gradient(ellipse 60% 60% at 50% 50%, #c4a96a0d 0%, transparent 70%), radial-gradient(ellipse 100% 100% at 50% 50%, #00000044 0%, transparent 80%); }
body[class*="space-"] .msg-deity .msg-bubble { background: rgba(10,9,8,0.92); }

body[class*="space-"] .panel-chat { background: transparent; }

/* ══ CÁMARA DE SIGILOS ══════════════════════════════════════════════ */
#camara-sigilos { display:none; position:fixed; inset:0; z-index:140; background:rgba(8,7,6,0.96); backdrop-filter:blur(10px); flex-direction:column; padding:24px 32px; }
#camara-sigilos.open { display:flex; animation:camaraIn 0.6s ease; }
@keyframes camaraIn { from{opacity:0} to{opacity:1} }
.camara-exit { position:absolute; top:20px; right:24px; z-index:10; background:transparent; border:1px solid var(--border2); border-radius:4px; color:var(--muted); font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.15em; padding:8px 16px; cursor:none; transition:all 0.2s; }
.camara-exit:hover { color:var(--isis); border-color:var(--isis); }
.camara-titulo { text-align:center; margin-bottom:20px; }

.camara-sub { font-size:14px; color:var(--muted); font-style:italic; letter-spacing:0.05em; }

.sigilo-seccion-titulo { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.22em; color:var(--muted); text-transform:uppercase; margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:8px; }
#sigilo-intencion { width:100%; background:var(--bg); border:1px solid var(--border2); border-radius:5px; padding:12px; color:var(--text); font-family:'Cormorant Garamond',serif; font-size:16px; resize:vertical; outline:none; line-height:1.5; cursor:none; }

.proceso-esencia { color:var(--tutu); font-size:20px; letter-spacing:0.3em; font-family:'Cinzel',serif; margin-top:4px; }

.lienzo-btn { flex:1; padding:9px; background:transparent; border:1px solid var(--border2); border-radius:4px; color:var(--muted); font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.1em; cursor:none; transition:all 0.2s; }
.lienzo-btn:hover { color:var(--text); border-color:var(--muted); }
.sigilo-btn-deidad { width:100%; margin-bottom:8px; padding:10px; background:transparent; border:1px solid var(--border2); border-radius:5px; color:var(--muted); font-family:'Cormorant Garamond',serif; font-size:14px; font-style:italic; cursor:none; transition:all 0.2s; text-align:left; }

.lienzo-circulo { position:absolute; inset:0; width:100%; height:100%; color:var(--tutu); pointer-events:none; }

.lienzo-mensaje-deidad { max-width:520px; text-align:center; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:16px; color:var(--muted); min-height:30px; line-height:1.6; }

/* ══ CÁMARA DE TAROT ════════════════════════════════════════════════ */

.tarot-natal-btn { background:transparent; border:1px solid var(--border2); border-radius:5px; color:var(--muted); font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.12em; padding:8px 14px; cursor:none; transition:all 0.2s; }
